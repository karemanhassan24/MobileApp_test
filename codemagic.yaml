workflows:
  android-debug:
    name: Android Debug Build
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      node: latest
      java: 17

    scripts:
      - npm install
      - npm run build
      - npx cap add android
      - npx cap sync android
      - cd android && chmod +x gradlew && ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk